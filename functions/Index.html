<!DOCTYPE html>
<html>
<head><title>Buy Number</title></head>
<body>
<button onclick="buy()">Buy Number</button>
<p id="result"></p>
<script>
async function buy() {
  const res = await fetch('/.netlify/functions/buy-number', {
    method: 'POST',
    body: JSON.stringify({service:'whatsapp', country:'US'})
  });
  const data = await res.json();
  document.getElementById('result').innerText = data.number || 'Error';
}
</script>
</body>
</html>
