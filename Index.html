<!DOCTYPE html>
<html>
<head><title>Buy Number</title></head>
<body>
<button onclick="buy()">Buy Number</button>
<p id="result"></p>

<script>
async function buy() {
  const result = document.getElementById('result');
  result.innerText = 'Loading...';

  try {
    const res = await fetch('/.netlify/functions/buy-number', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        service: 'Whatsapp',
        country: 'US'
      })
    });

    const data = await res.json();
    result.innerText = JSON.stringify(data); // Show everything
  } catch (err) {
    result.innerText = 'Error: ' + err.message;
  }
}
</script>
</body>
</html>
